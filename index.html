<style>
:root {
  --bg: #F7F5F1; --card: #FFFFFF; --ink: #0A0F1C; --sub: #6E7684; --line: #E8E3DA;
  --track: #EDE7DC; --gold: #C9993A; --gold-lt: #DDB96A; --gold-dim: rgba(201,153,58,.14);
  --good: #2E7D5B; --good-dim: rgba(46,125,91,.12); --warn: #B4483E; --warn-dim: rgba(180,72,62,.1);
  --serif: 'DM Serif Display', Georgia, serif; --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { box-sizing: border-box; margin: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); padding-bottom: 88px; -webkit-font-smoothing: antialiased; }
body.auth { background: var(--ink); padding-bottom: 0; }
body.flow { padding-bottom: 0; }
.wrap { max-width: 560px; margin: 0 auto; padding: 16px; }
.card { background: var(--card); border-radius: 14px; padding: 18px; margin-bottom: 14px; border: 1px solid var(--line); box-shadow: 0 1px 2px rgba(10,15,28,.04); }
h2 { font-family: var(--serif); font-weight: 400; font-size: 20px; margin-bottom: 10px; letter-spacing: .2px; }
h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.brand { font-family: var(--serif); font-size: 17px; letter-spacing: .3px; }
.brand .accent { color: var(--gold); }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.greet { color: var(--sub); font-size: 13px; margin-bottom: 12px; }
.big { font-family: var(--serif); font-size: 44px; line-height: 1.1; letter-spacing: .5px; }
.muted { color: var(--sub); font-size: 13px; line-height: 1.55; }
.label { font-size: 12px; color: var(--sub); margin: 12px 0 5px; display: block; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--line); font-size: 16px; background: #fff; color: var(--ink); font-family: var(--sans); }
textarea { min-height: 74px; resize: vertical; }
input:focus, select:focus, textarea:focus { outline: 2px solid var(--gold-lt); border-color: var(--gold); }
.btn { display: block; width: 100%; padding: 14px; border-radius: 10px; background: var(--ink); color: #fff; border: 0; font-size: 15px; font-weight: 600; margin-top: 14px; cursor: pointer; font-family: var(--sans); }
.btn.ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
.btn.small { width: auto; display: inline-block; padding: 8px 14px; font-size: 13px; margin-top: 0; }
.btn[disabled] { opacity: .5; cursor: default; }
.row { display: flex; gap: 10px; }
.row > * { flex: 1; }
.bar { height: 8px; background: var(--track); border-radius: 5px; overflow: hidden; margin: 8px 0; }
.bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-lt)); border-radius: 5px; }
.bar i.over { background: var(--warn); }
.bar i.gd { background: var(--good); }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
.chip { padding: 8px 14px; border-radius: 999px; border: 1px solid var(--line); background: #fff; font-size: 13.5px; cursor: pointer; color: var(--ink); }
.chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.seg { display: flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin: 10px 0; }
.seg button { flex: 1; padding: 11px; border: 0; background: #fff; font-size: 14px; cursor: pointer; color: var(--ink); font-family: var(--sans); }
.seg button.on { background: var(--ink); color: #fff; font-weight: 600; }
.tx { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-top: 1px solid var(--line); gap: 8px; }
.tx:first-of-type { border-top: 0; }
.tx .amt { font-weight: 600; white-space: nowrap; font-variant-numeric: tabular-nums; }
.tx .amt.plus { color: var(--good); }
.del { color: #A8ADB7; background: none; border: 0; font-size: 17px; padding: 2px 6px; cursor: pointer; line-height: 1; }
#tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--line); display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 40; }
.tab { flex: 1; text-align: center; color: #9AA0AB; font-size: 10.5px; padding: 2px 0; cursor: pointer; font-weight: 500; }
.tab svg { width: 22px; height: 22px; display: block; margin: 0 auto 3px; }
.tab.on { color: var(--ink); font-weight: 700; }
.tab.on svg { color: var(--gold); }
#toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 10px; z-index: 60; font-size: 14px; max-width: 88%; text-align: center; box-shadow: 0 4px 16px rgba(10,15,28,.25); }
.hidden { display: none !important; }
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 999px; background: var(--gold-dim); color: #8A6825; font-size: 12.5px; font-weight: 600; }
.pill svg { width: 13px; height: 13px; }
.pill.warn { background: var(--warn-dim); color: var(--warn); }
.pill.good { background: var(--good-dim); color: var(--good); }
.warn { color: var(--warn); } .good { color: var(--good); }
.link { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--gold); background: none; border: 0; font-size: 14px; cursor: pointer; padding: 0; font-family: var(--sans); }
.spread { display: flex; justify-content: space-between; align-items: baseline; }
.mt { margin-top: 12px; } .center { text-align: center; }
label.radio { display: flex; gap: 10px; padding: 11px 0; border-top: 1px solid var(--line); font-size: 14px; align-items: flex-start; cursor: pointer; }
label.radio input { width: auto; margin-top: 3px; accent-color: var(--gold); }
.catrow { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
.catrow .name { flex: 1; font-size: 14px; }
.catrow input { max-width: 108px; text-align: right; padding: 9px 10px; }
.serifnum { font-family: var(--serif); }
.auth-hero { text-align: center; padding: 56px 0 30px; }
.auth-hero .brand { font-size: 30px; color: #F0F4F8; }
.auth-hero .tag { color: #9AA1AD; font-size: 14px; margin-top: 10px; }
.auth-foot { color: #767E8B; font-size: 12.5px; text-align: center; margin-top: 18px; line-height: 1.6; }
.auth-foot .by { color: var(--gold); }
body.auth .card { border: 0; }
/* progress dots */
.steps { display: flex; gap: 6px; justify-content: center; margin: 4px 0 16px; }
.steps i { width: 22px; height: 4px; border-radius: 2px; background: var(--line); display: block; }
.steps i.on { background: var(--gold); }
.steps i.done { background: var(--ink); }
.stepnum { color: var(--sub); font-size: 12px; text-align: center; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
/* kpi grid */
.kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.kpi { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
.kpi .n { font-family: var(--serif); font-size: 24px; line-height: 1.1; }
.kpi .k { font-size: 10.5px; color: var(--sub); text-transform: uppercase; letter-spacing: .05em; margin-top: 3px; font-weight: 600; }
.flagrow { display: flex; align-items: flex-start; gap: 8px; padding: 9px 0; border-top: 1px solid var(--line); font-size: 13.5px; }
.flagrow:first-child { border-top: 0; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warn); margin-top: 5px; flex: none; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 6px; background: var(--warn-dim); color: var(--warn); font-size: 11.5px; font-weight: 600; margin: 2px 4px 2px 0; }
.tag.gd { background: var(--good-dim); color: var(--good); }
.trend { font-size: 13px; font-weight: 600; }
.improw { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; padding: 8px 0; border-top: 1px solid var(--line); font-size: 13px; }
.improw select { padding: 6px 8px; font-size: 13px; max-width: 130px; }
.scroll { max-height: 300px; overflow-y: auto; }
@media (min-width: 620px) { .kpis { grid-template-columns: repeat(6, 1fr); } }
</style>
</head>

/* ---------------- CSV IMPORT ---------------- */
function pickCSV(done) {
  var inp = q('csvfile');
  inp.value = '';
  inp.onchange = function () {
    var f = inp.files[0]; if (!f) return;
    var reader = new FileReader();
    reader.onload = function () { stageImport(reader.result); if (done) done(); };
    reader.readAsText(f);
  };

}
function parseCSV(text) {
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  var rows = [], field = '', row = [], inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (inQ) { if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; } else field += c; }
    else { if (c === '"') inQ = true; else if (c === ',') { row.push(field); field = ''; } else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; } else field += c; }
  }

}
function parseDate(s) {
  s = String(s).trim(); if (!s) return null;

  if (m) { var yr = m[3]; if (yr.length === 2) yr = '20' + yr; return yr + '-' + ('0' + m[1]).slice(-2) + '-' + ('0' + m[2]).slice(-2); }

  return null;
}
function toNum(s) { var n = parseFloat(String(s).replace(/[^0-9.\-]/g, '')); return isFinite(n) ? n : NaN; }
function guessCol(headers, res) { for (var i = 0; i < headers.length; i++) if (res.test(headers[i])) return i; return -1; }

function stageImport(text) {
  var rows = parseCSV(text);
  if (rows.length < 2) { toast('That file has no rows we can read.'); return; }
  var headers = rows[0].map(function (h) { return String(h).trim(); });
  var body = rows.slice(1);
  var dateI = guessCol(headers, /date|posted/i);
  var descI = guessCol(headers, /desc|name|memo|payee|detail|transaction/i);
  var amtI = guessCol(headers, /amount|amt/i);
  var debitI = guessCol(headers, /debit|withdraw/i);
  var creditI = guessCol(headers, /credit|deposit/i);

  if (descI < 0) { for (var c = 0; c < headers.length; c++) if (c !== dateI && c !== amtI) { descI = c; break; } }
  var mode = (amtI < 0 && debitI >= 0) ? 'split' : 'single';
  if (amtI < 0 && mode === 'single') { for (var a = 0; a < headers.length; a++) if (a !== dateI && a !== descI && !isNaN(toNum(body[0] && body[0][a]))) { amtI = a; break; } }
  IMPORT = { headers: headers, body: body, dateI: dateI, descI: descI, amtI: amtI, debitI: debitI, creditI: creditI, mode: mode, spendSign: 'neg' };
  TAB = 'home';
  renderImportReview();
}
function computeImport() {
  var I = IMPORT; var out = [];
  for (var r = 0; r < I.body.length; r++) {

    var desc = String(row[I.descI] || '').trim();

}

/* ---------------- PAYOFF PLANNER (wizard step 7 + reused in Debts) ---------------- */
function simulate(debts, extra, method) {
  var list = debts.filter(function (d) { return Number(d.balance) > 0; }).map(function (d) { return { name: d.name, bal: Number(d.balance), apr: Number(d.apr) || 0, min: Number(d.min_payment) || 0 }; });
  if (!list.length) return null;
  list.sort(function (a, b) { return method === 'avalanche' ? b.apr - a.apr : a.bal - b.bal; });
  var totalPay = extra; list.forEach(function (d) { totalPay += d.min; });
  if (!(totalPay > 0)) return { stuck: true };
  var months = 0, interest = 0, payoffs = [];
  while (months < 600) {
    var alive = list.filter(function (d) { return d.bal > 0.005; }); if (!alive.length) break;
    months++;
    alive.forEach(function (d) { var it = d.bal * d.apr / 100 / 12; d.bal += it; interest += it; });
    var budget = totalPay;
    alive.forEach(function (d) { var p = Math.min(d.bal, d.min); d.bal -= p; budget -= p; });
    for (var j = 0; j < list.length && budget > 0; j++) if (list[j].bal > 0.005) { var p2 = Math.min(list[j].bal, budget); list[j].bal -= p2; budget -= p2; }
    list.forEach(function (d) { if (d.bal <= 0.005 && !d.done) { d.done = true; payoffs.push({ name: d.name, month: months }); } });
  }
  if (months >= 600) return { stuck: true };
  return { months: months, interest: interest, payoffs: payoffs };
}

  var h = '<h2>Your payoff plan</h2>';
  if (!debts.length) { h += '<p class="muted">You didn\'t add any debts — you can skip this. If you have credit cards or loans, go back and add them.</p><button class="btn" id="pp_next">Continue</button>'; wizShell(step, h); q('pp_next').onclick = function () { setStep(8, function () { load(); }); }; return; }

/* ---------------- DEBTS INNER (wizard step 4 + Debts tab) ---------------- */

  var bar = q('tabbar'); bar.innerHTML = h; bar.classList.remove('hidden');

  var st = S.settings || {}; var extra = Number(st.extra_debt_monthly) || 0; var method = st.payoff_method || 'snowball';
  var h = '<div class="card"><h2>Payoff plan</h2><span class="label">Extra toward debt each month</span><input id="x_extra" type="number" inputmode="decimal" value="' + (extra || '') + '" placeholder="e.g. 400">';
  h += '<div class="seg"><button id="m_snow" class="' + (method === 'snowball' ? 'on' : '') + '">Snowball</button><button id="m_aval" class="' + (method === 'avalanche' ? 'on' : '') + '">Avalanche</button></div><button class="btn" id="x_save">Update plan</button>';
  var sim = simulate(debts, extra, method); var other = simulate(debts, extra, method === 'snowball' ? 'avalanche' : 'snowball');
  if (sim && sim.stuck) h += '<p class="mt warn"><b>Minimums alone can\'t beat the interest.</b> Add any extra — even $50 changes everything.</p>';
  else if (sim) {
    h += '<div class="mt center"><div class="muted">Debt-free by</div><div class="serifnum good" style="font-size:32px">' + monthAfter(sim.months) + '</div><div class="muted">' + sim.months + ' months · ' + fmt(sim.interest) + ' total interest</div></div>';
    if (other && !other.stuck) { var diff = other.interest - sim.interest; h += '<p class="muted mt center">' + (method === 'snowball' ? 'Avalanche' : 'Snowball') + ' instead: ' + other.months + ' months, ' + fmt(other.interest) + ' interest (' + (diff >= 0 ? 'you save ' + fmt(Math.abs(diff)) : 'costs ' + fmt(Math.abs(diff)) + ' more') + ' your way).</p>'; }
    if (sim.payoffs.length) { h += '<div class="mt"><span class="label">Payoff order</span>'; sim.payoffs.forEach(function (p, i) { h += '<div class="tx"><span>' + (i + 1) + '. ' + esc(p.name) + '</span><span class="muted">' + monthAfter(p.month) + '</span></div>'; }); h += '</div>'; }
  }
  return h + '</div>';
}
function bindPayoffCard() {
  if (!q('x_save')) return;
  var method = (S.settings || {}).payoff_method || 'snowball'; var m2 = method;
  q('m_snow').onclick = function () { m2 = 'snowball'; q('m_snow').classList.add('on'); q('m_aval').classList.remove('on'); };
  q('m_aval').onclick = function () { m2 = 'avalanche'; q('m_aval').classList.add('on'); q('m_snow').classList.remove('on'); };
  q('x_save').onclick = function () { api('settings', 'PUT', { extra_debt_monthly: parseFloat(val('x_extra')) || 0, payoff_method: m2 }).then(function () { toast('Plan updated'); return load(); }).catch(oops); };
}
function bindDebtActions() {
  Array.prototype.forEach.call(document.querySelectorAll('[data-pay]'), function (el) { el.onclick = function () { var amt = parseFloat(prompt('Payment amount?') || ''); if (!(amt > 0)) return; api('debts', 'PUT', { id: el.getAttribute('data-pay'), payment: amt }).then(function (r) { toast(r.balance <= 0 ? 'Paid off. Incredible!' : 'Payment logged'); return load(); }).catch(oops); }; });
  Array.prototype.forEach.call(document.querySelectorAll('[data-editd]'), function (el) { el.onclick = function () { var id = el.getAttribute('data-editd'); var d = (S.debts || []).find(function (x) { return x.id === id; }); if (!d) return; var nb = prompt('Current balance for ' + d.name + ':', d.balance); if (nb === null) return; api('debts', 'PUT', { id: id, balance: parseFloat(nb) || 0 }).then(load).catch(oops); }; });
  Array.prototype.forEach.call(document.querySelectorAll('[data-deld]'), function (el) { el.onclick = function () { if (!confirm('Remove this debt?')) return; api('debts?id=' + el.getAttribute('data-deld'), 'DELETE').then(load).catch(oops); }; });
}

/* ---------------- COACH HUB ---------------- */
function renderCoach() {
  var h = '<div class="wrap"><div class="topbar"><span class="brand">Coach <span class="accent">Hub</span></span><button class="btn small ghost" id="c_refresh">Refresh</button></div>';
  if (!COACH) { h += '<div class="card muted">Loading dashboard…</div></div>'; q('view').innerHTML = h; loadCoach(); return; }
  var k = COACH.kpi; var ms = COACH.members;
  var avgStreak = k.members ? (k.streak_sum / k.members) : 0;
  h += '<div class="kpis">';
  h += kpiTile(k.members, 'Members');
  h += kpiTile(fmt0(k.debt_total), 'Debt left');
  h += kpiTile(fmt0(k.paid_down), 'Paid down');
  h += kpiTile(avgStreak.toFixed(0), 'Avg streak');
  h += kpiTile(k.needs_attention, 'Need attention');
  h += kpiTile(fmt0(k.saved), 'Saved');
  h += '</div>';
  if (k.sharing_detail < k.members) h += '<p class="muted center" style="margin:-6px 0 12px">Dollar figures reflect the ' + k.sharing_detail + ' of ' + k.members + ' members sharing details. Others share streaks only.</p>';

  // flags
  var flagged = ms.filter(function (m) { return m.flags && m.flags.length; });
  if (flagged.length) {
    h += '<div class="card"><h2>Bring these up</h2>';
    flagged.forEach(function (m) { h += '<div class="flagrow"><span class="dot"></span><div><b>' + esc(m.display_name) + '</b> ' + m.flags.map(function (f) { return '<span class="tag">' + esc(f) + '</span>'; }).join('') + '</div></div>'; });
    h += '</div>';
  }

  // filters
  h += '<div class="card"><div class="seg"><button data-cf="all" class="' + (COACHFILTER === 'all' ? 'on' : '') + '">All (' + ms.length + ')</button><button data-cf="attention" class="' + (COACHFILTER === 'attention' ? 'on' : '') + '">Needs attention (' + flagged.length + ')</button><button data-cf="ontrack" class="' + (COACHFILTER === 'ontrack' ? 'on' : '') + '">On track (' + (ms.length - flagged.length) + ')</button></div>';
  h += '<input id="c_search" placeholder="Search members…" value="' + esc(COACHSEARCH) + '"><button class="btn ghost mt" id="c_digest">Copy weekly digest</button></div>';

  var shown = ms.filter(function (m) {
    if (COACHFILTER === 'attention' && !(m.flags && m.flags.length)) return false;
    if (COACHFILTER === 'ontrack' && (m.flags && m.flags.length)) return false;
    if (COACHSEARCH && m.display_name.toLowerCase().indexOf(COACHSEARCH.toLowerCase()) === -1) return false;
    return true;
  });
  if (!shown.length) h += '<div class="card muted">No members match.</div>';
  shown.forEach(function (m) { h += coachCard(m); });
  h += '</div>'; q('view').innerHTML = h;

  q('c_refresh').onclick = loadCoach;
  q('c_digest').onclick = function () { copyDigest(); };
  q('c_search').oninput = function () { COACHSEARCH = this.value; var pos = this.selectionStart; renderCoach(); var s = q('c_search'); if (s) { s.focus(); s.setSelectionRange(pos, pos); } };
  Array.prototype.forEach.call(document.querySelectorAll('[data-cf]'), function (el) { el.onclick = function () { COACHFILTER = el.getAttribute('data-cf'); renderCoach(); }; });
}
function kpiTile(n, k) { return '<div class="kpi"><div class="n">' + n + '</div><div class="k">' + k + '</div></div>'; }
function trendArrow(cur, prev) {
  if (prev <= 0) return '';
  var d = cur - prev; var pct = Math.round(Math.abs(d) / prev * 100);
  if (Math.abs(d) < 1) return '<span class="trend muted">flat vs last</span>';
  var up = d > 0;
  return '<span class="trend ' + (up ? 'warn' : 'good') + '">' + (up ? IC.up : IC.down) + ' ' + pct + '% ' + (up ? 'more' : 'less') + ' vs last</span>';
}
function coachCard(m) {
  var tierLbl = m.share_tier === 'full' ? 'sharing all' : m.share_tier === 'summary' ? 'sharing summary' : 'streaks only';
  var h = '<div class="card"><div class="spread"><b style="font-size:16px">' + esc(m.display_name) + '</b><span class="pill' + (m.flags && m.flags.length ? ' warn' : ' good') + '">' + (m.flags && m.flags.length ? m.flags.length + ' flag' + (m.flags.length > 1 ? 's' : '') : 'on track') + '</span></div>';
  h += '<div class="muted" style="margin:2px 0 6px">' + tierLbl + (m.primary_goal ? ' · goal: ' + esc(m.primary_goal) : '') + '</div>';
  var quiet = (m.last_logged && m.last_logged < m.today) ? Math.round((Date.parse(m.today) - Date.parse(m.last_logged)) / 864e5) : 0;
  h += '<div style="font-size:14px">' + m.streak + '-day streak' + (m.last_logged ? ' · last log ' + dshort(m.last_logged) : ' · no logs yet') + (quiet >= 3 ? ' <span class="warn">(quiet ' + quiet + 'd)</span>' : '') + '</div>';
  h += '<div class="mt"><span class="muted">Debt progress</span><div class="bar"><i style="width:' + (m.debt_paid_pct || 0) + '%"></i></div><span class="muted">' + (m.debt_paid_pct || 0).toFixed(1) + '% paid' + (m.debt_total !== undefined ? ' · ' + fmt(m.debt_total) + ' left' : '') + (m.debt_paid_month ? ' · ' + fmt(m.debt_paid_month) + ' this month' : '') + '</span></div>';
  if (m.flex_budget !== undefined) {
    var pct = m.flex_budget > 0 ? Math.min(100, m.spent_this_period / m.flex_budget * 100) : 0;
    h += '<div class="mt"><div class="spread"><span class="muted">This paycheck: ' + fmt(m.spent_this_period) + ' of ' + fmt(m.flex_budget) + '</span>' + trendArrow(m.spent_this_period, m.spent_prev_period) + '</div><div class="bar"><i class="' + (m.flex_left < 0 ? 'over' : '') + '" style="width:' + pct + '%"></i></div><span class="' + (m.flex_left < 0 ? 'warn' : 'good') + '" style="font-size:13px;font-weight:600">' + fmt(m.flex_left) + ' left</span>';
    if (m.imported_count) h += ' <span class="muted">· ' + m.imported_count + ' imported</span>';
    h += '</div>';
  }
  if (m.saved_total !== undefined && m.goal_target > 0) { var gp = Math.min(100, m.saved_total / m.goal_target * 100); h += '<div class="mt"><span class="muted">Savings ' + fmt(m.saved_total) + ' of ' + fmt(m.goal_target) + '</span><div class="bar"><i class="gd" style="width:' + gp + '%"></i></div></div>'; }
  if (m.avg_by_category && Object.keys(m.avg_by_category).length) {
    var cats = Object.keys(m.avg_by_category).sort(function (a, b) { return m.avg_by_category[b] - m.avg_by_category[a]; }).slice(0, 4);
    h += '<div class="mt"><span class="label">Top monthly averages</span>' + cats.map(function (c) { return '<span class="tag gd">' + esc(c) + ' ' + fmt0(m.avg_by_category[c]) + '</span>'; }).join('') + '</div>';
  }
  if (m.tx && m.tx.length) { h += '<div class="mt"><span class="label">Recent</span>'; m.tx.slice(0, 6).forEach(function (t) { var lbl = t.kind === 'no_spend' ? 'No-spend day' : esc(t.category) + (t.note ? ' · ' + esc(t.note) : ''); h += '<div class="tx"><div><div style="font-size:13px">' + lbl + '</div><div class="muted">' + dshort(t.spent_at) + '</div></div><span class="amt' + (t.kind === 'income' ? ' plus' : '') + '">' + (t.kind === 'income' ? '+' : '') + fmt(t.amount) + '</span></div>'; }); h += '</div>'; }
  return h + '</div>';
}
function loadCoach() { api('coach').then(function (d) { COACH = d; if (TAB === 'team') renderCoach(); }).catch(oops); }
function copyDigest() {
  if (!COACH) return; var k = COACH.kpi;
  var lines = ['Pocket Planner — Weekly Coach Digest (' + COACH.today + ')', ''];
  lines.push('Members: ' + k.members + ' | Debt left: ' + fmt0(k.debt_total) + ' | Paid down: ' + fmt0(k.paid_down) + ' | Saved: ' + fmt0(k.saved) + ' | Need attention: ' + k.needs_attention, '');
  COACH.members.forEach(function (m) {
    lines.push('• ' + m.display_name + ' (' + m.share_tier + ')');
    lines.push('   streak ' + m.streak + 'd, debt ' + (m.debt_paid_pct || 0).toFixed(0) + '% paid' + (m.debt_total !== undefined ? ' (' + fmt0(m.debt_total) + ' left)' : ''));
    if (m.flex_budget !== undefined) lines.push('   this paycheck: ' + fmt0(m.spent_this_period) + ' of ' + fmt0(m.flex_budget) + ' (' + fmt0(m.flex_left) + ' left)');
    if (m.flags && m.flags.length) lines.push('   FLAGS: ' + m.flags.join(', '));
  });
  var text = lines.join('\n');
  if (navigator.clipboard) navigator.clipboard.writeText(text).then(function () { toast('Digest copied to clipboard'); }, function () { fallbackCopy(text); });
  else fallbackCopy(text);
}
function fallbackCopy(text) { var ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); toast('Digest copied'); } catch (e) { toast('Copy not supported'); } document.body.removeChild(ta); }

/* ---------------- MORE ---------------- */
function renderMore() {
  var h = '<div class="wrap">' + topbar();
  h += '<div class="card"><h2>' + esc(S.user.display_name) + '</h2><p class="muted">@' + esc(S.user.username) + ' · ' + (S.user.role === 'coach' ? 'Coach' : 'Member') + '</p></div>';
  if (S.user.role !== 'coach') {
    h += '<div class="card"><h2>What your coach can see</h2><p class="muted">You\'re in control. Change it any time.</p>';
    [['full', 'Everything', 'Progress, budgets, and individual purchases.'], ['summary', 'Summary only', 'Totals and progress — never individual purchases.'], ['streaks', 'Streaks only', 'Just your logging streak and debt progress %.']].forEach(function (t) { h += '<label class="radio"><input type="radio" name="tier" value="' + t[0] + '"' + (S.user.share_tier === t[0] ? ' checked' : '') + '><span><b>' + t[1] + '</b><br><span class="muted">' + t[2] + '</span></span></label>'; });
    h += '</div>';
    h += '<div class="card"><h2>Redo my setup</h2><p class="muted">Walk through goals, import, budget and plan again.</p><button class="btn ghost" id="m_redo">Restart setup</button></div>';
  } else if (S.codes) {
    h += '<div class="card"><h2>Invite your team</h2><p class="muted">Send them this link and the member code:</p><div class="mt"><span class="pill" style="font-size:15px">' + esc(S.codes.member_invite_code) + '</span></div><p class="muted mt">Coach code (keep private): <b>' + esc(S.codes.coach_invite_code) + '</b></p></div>';
  }
  h += '<div class="card"><h2>Ground rules</h2><p class="muted">Manual entry and statement import only — never enter bank logins or card numbers here.<br>This is a planning tool, not professional financial advice.</p></div>';
  h += '<button class="btn ghost" id="m_logout">Sign out</button><p class="muted center mt">A personal tool by RAIS Advisory</p></div>';
  q('view').innerHTML = h;
  Array.prototype.forEach.call(document.querySelectorAll('input[name=tier]'), function (el) { el.onchange = function () { api('share', 'PUT', { share_tier: el.value }).then(function () { S.user.share_tier = el.value; toast('Sharing updated'); }).catch(oops); }; });
  if (q('m_redo')) q('m_redo').onclick = function () { setStep(2, function () { document.body.classList.add('flow'); q('tabbar').classList.add('hidden'); load(); }); };
  q('m_logout').onclick = function () { api('logout', 'POST').catch(function () {}).then(function () { setToken(''); S = null; COACH = null; TAB = 'home'; renderAuth(); }); };
}

/* ---------------- INIT ---------------- */
if (TOKEN) load(); else renderAuth();
</script>
