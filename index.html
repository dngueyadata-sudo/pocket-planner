<style>
:root {
  --bg: #F7F5F1; --card: #FFFFFF; --ink: #0A0F1C; --sub: #6E7684; --line: #E8E3DA;
  --track: #EDE7DC; --gold: #C9993A; --gold-lt: #DDB96A; --gold-dim: rgba(201,153,58,.14);
  --good: #2E7D5B; --good-dim: rgba(46,125,91,.12); --warn: #B4483E; --warn-dim: rgba(180,72,62,.1);
  --serif: 'DM Serif Display', Georgia, serif; --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { box-sizing: border-box; margin: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); padding-bottom: 88px; -webkit-font-smoothing: antialiased; }
body.auth { background: var(--ink); padding-bottom: 0; }
body.flow { padding-bottom: 0; }
.wrap { max-width: 560px; margin: 0 auto; padding: 16px; }
.card { background: var(--card); border-radius: 14px; padding: 18px; margin-bottom: 14px; border: 1px solid var(--line); box-shadow: 0 1px 2px rgba(10,15,28,.04); }
h2 { font-family: var(--serif); font-weight: 400; font-size: 20px; margin-bottom: 10px; letter-spacing: .2px; }
h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.brand { font-family: var(--serif); font-size: 17px; letter-spacing: .3px; }
.brand .accent { color: var(--gold); }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.greet { color: var(--sub); font-size: 13px; margin-bottom: 12px; }
.big { font-family: var(--serif); font-size: 44px; line-height: 1.1; letter-spacing: .5px; }
.muted { color: var(--sub); font-size: 13px; line-height: 1.55; }
.label { font-size: 12px; color: var(--sub); margin: 12px 0 5px; display: block; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--line); font-size: 16px; background: #fff; color: var(--ink); font-family: var(--sans); }
textarea { min-height: 74px; resize: vertical; }
input:focus, select:focus, textarea:focus { outline: 2px solid var(--gold-lt); border-color: var(--gold); }
.btn { display: block; width: 100%; padding: 14px; border-radius: 10px; background: var(--ink); color: #fff; border: 0; font-size: 15px; font-weight: 600; margin-top: 14px; cursor: pointer; font-family: var(--sans); }
.btn.ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
.btn.small { width: auto; display: inline-block; padding: 8px 14px; font-size: 13px; margin-top: 0; }
.btn[disabled] { opacity: .5; cursor: default; }
.row { display: flex; gap: 10px; }
.row > * { flex: 1; }
.bar { height: 8px; background: var(--track); border-radius: 5px; overflow: hidden; margin: 8px 0; }
.bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-lt)); border-radius: 5px; }
.bar i.over { background: var(--warn); }
.bar i.gd { background: var(--good); }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
.chip { padding: 8px 14px; border-radius: 999px; border: 1px solid var(--line); background: #fff; font-size: 13.5px; cursor: pointer; color: var(--ink); }
.chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.seg { display: flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin: 10px 0; }
.seg button { flex: 1; padding: 11px; border: 0; background: #fff; font-size: 14px; cursor: pointer; color: var(--ink); font-family: var(--sans); }
.seg button.on { background: var(--ink); color: #fff; font-weight: 600; }
.tx { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-top: 1px solid var(--line); gap: 8px; }
.tx:first-of-type { border-top: 0; }
.tx .amt { font-weight: 600; white-space: nowrap; font-variant-numeric: tabular-nums; }
.tx .amt.plus { color: var(--good); }
.del { color: #A8ADB7; background: none; border: 0; font-size: 17px; padding: 2px 6px; cursor: pointer; line-height: 1; }
#tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--line); display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 40; }
.tab { flex: 1; text-align: center; color: #9AA0AB; font-size: 10.5px; padding: 2px 0; cursor: pointer; font-weight: 500; }
.tab svg { width: 22px; height: 22px; display: block; margin: 0 auto 3px; }
.tab.on { color: var(--ink); font-weight: 700; }
.tab.on svg { color: var(--gold); }
#toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 10px; z-index: 60; font-size: 14px; max-width: 88%; text-align: center; box-shadow: 0 4px 16px rgba(10,15,28,.25); }
.hidden { display: none !important; }
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 999px; background: var(--gold-dim); color: #8A6825; font-size: 12.5px; font-weight: 600; }
.pill svg { width: 13px; height: 13px; }
.pill.warn { background: var(--warn-dim); color: var(--warn); }
.pill.good { background: var(--good-dim); color: var(--good); }
.warn { color: var(--warn); } .good { color: var(--good); }
.link { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--gold); background: none; border: 0; font-size: 14px; cursor: pointer; padding: 0; font-family: var(--sans); }
.spread { display: flex; justify-content: space-between; align-items: baseline; }
.mt { margin-top: 12px; } .center { text-align: center; }
label.radio { display: flex; gap: 10px; padding: 11px 0; border-top: 1px solid var(--line); font-size: 14px; align-items: flex-start; cursor: pointer; }
label.radio input { width: auto; margin-top: 3px; accent-color: var(--gold); }
.catrow { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
.catrow .name { flex: 1; font-size: 14px; }
.catrow input { max-width: 108px; text-align: right; padding: 9px 10px; }
.serifnum { font-family: var(--serif); }
.auth-hero { text-align: center; padding: 56px 0 30px; }
.auth-hero .brand { font-size: 30px; color: #F0F4F8; }
.auth-hero .tag { color: #9AA1AD; font-size: 14px; margin-top: 10px; }
.auth-foot { color: #767E8B; font-size: 12.5px; text-align: center; margin-top: 18px; line-height: 1.6; }
.auth-foot .by { color: var(--gold); }
body.auth .card { border: 0; }
/* progress dots */
.steps { display: flex; gap: 6px; justify-content: center; margin: 4px 0 16px; }
.steps i { width: 22px; height: 4px; border-radius: 2px; background: var(--line); display: block; }
.steps i.on { background: var(--gold); }
.steps i.done { background: var(--ink); }
.stepnum { color: var(--sub); font-size: 12px; text-align: center; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
/* kpi grid */
.kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.kpi { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
.kpi .n { font-family: var(--serif); font-size: 24px; line-height: 1.1; }
.kpi .k { font-size: 10.5px; color: var(--sub); text-transform: uppercase; letter-spacing: .05em; margin-top: 3px; font-weight: 600; }
.flagrow { display: flex; align-items: flex-start; gap: 8px; padding: 9px 0; border-top: 1px solid var(--line); font-size: 13.5px; }
.flagrow:first-child { border-top: 0; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warn); margin-top: 5px; flex: none; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 6px; background: var(--warn-dim); color: var(--warn); font-size: 11.5px; font-weight: 600; margin: 2px 4px 2px 0; }
.tag.gd { background: var(--good-dim); color: var(--good); }
.trend { font-size: 13px; font-weight: 600; }
.improw { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; padding: 8px 0; border-top: 1px solid var(--line); font-size: 13px; }
.improw select { padding: 6px 8px; font-size: 13px; max-width: 130px; }
.scroll { max-height: 300px; overflow-y: auto; }
@media (min-width: 620px) { .kpis { grid-template-columns: repeat(6, 1fr); } }
</style>

/* ---------------- PAYOFF PLANNER (wizard step 8 + reused in Debts) ---------------- */
function simulate(debts, extra, method) {
  var list = debts.filter(function (d) { return Number(d.balance) > 0; }).map(function (d) { return { name: d.name, bal: Number(d.balance), apr: Number(d.apr) || 0, min: Number(d.min_payment) || 0 }; });
  if (!list.length) return null;
  list.sort(function (a, b) { return method === 'avalanche' ? b.apr - a.apr : a.bal - b.bal; });
  var totalPay = extra; list.forEach(function (d) { totalPay += d.min; });
  if (!(totalPay > 0)) return { stuck: true };
  var months = 0, interest = 0, payoffs = [];
  while (months < 600) {
    var alive = list.filter(function (d) { return d.bal > 0.005; }); if (!alive.length) break;
    months++;
    alive.forEach(function (d) { var it = d.bal * d.apr / 100 / 12; d.bal += it; interest += it; });
    var budget = totalPay;
    alive.forEach(function (d) { var p = Math.min(d.bal, d.min); d.bal -= p; budget -= p; });
    for (var j = 0; j < list.length && budget > 0; j++) if (list[j].bal > 0.005) { var p2 = Math.min(list[j].bal, budget); list[j].bal -= p2; budget -= p2; }
    list.forEach(function (d) { if (d.bal <= 0.005 && !d.done) { d.done = true; payoffs.push({ name: d.name, month: months }); } });
  }
  if (months >= 600) return { stuck: true };
  return { months: months, interest: interest, payoffs: payoffs };
}

/* ---------------- ROADMAP (Dave Ramsey Baby Steps) ---------------- */
function goalsForStep(n) { return (S.goals || []).filter(function (g) { return Number(g.step) === n; }); }
function monthlyExpenses() {
  var bills = (S.bills || []).reduce(function (s, b) { return s + Number(b.amount || 0); }, 0);
  var flexMo = (Number(S.flex_budget_effective) || 0) * 26 / 12;
  var est = bills + flexMo;
  if (est <= 0 && S.settings) est = Number(S.settings.income_monthly) * 0.8;
  return est;
}
function stepComplete(step, cur) {
  if (step.kind === 'ef_starter') { var g = goalsForStep(1); return g.length && g.reduce(function (s, x) { return s + Number(x.saved_amount); }, 0) >= 1000; }
  if (step.kind === 'debt') return (S.debt_start > 0 && S.debt_total <= 0);
  if (step.kind === 'ef_full') { var t = monthlyExpenses() * 3; var g3 = goalsForStep(3); return t > 0 && g3.length && g3.reduce(function (s, x) { return s + Number(x.saved_amount); }, 0) >= t; }
  return cur > step.n;
}
function goalBlock(n) {
  var gs = goalsForStep(n); var h = '';
  gs.forEach(function (g) {
    var pct = g.target_amount > 0 ? Math.min(100, g.saved_amount / g.target_amount * 100) : 0;
    h += '<div style="padding:8px 0;border-top:1px solid var(--line)"><div class="spread"><span style="font-size:14px">' + esc(g.name) + '</span><b class="amt">' + fmt(g.saved_amount) + (g.target_amount > 0 ? ' <span class="muted">/ ' + fmt(g.target_amount) + '</span>' : '') + '</b></div>';
    if (g.target_amount > 0) h += '<div class="bar"><i class="gd" style="width:' + pct + '%"></i></div>';
    h += '<div><button class="btn small" data-addg="' + g.id + '">Add money</button> <button class="del" data-delg="' + g.id + '">&#10005;</button></div></div>';
  });
  if (ROADMAP_OPEN === n) {
    h += '<div class="mt"><input id="rg_name" placeholder="Name (e.g. ' + (n === 1 ? 'Starter fund' : n === 3 ? 'Emergency fund' : n === 5 ? 'College fund' : 'Goal') + ')"><div class="row mt"><input id="rg_target" type="number" inputmode="decimal" placeholder="Target $ (optional)"><input id="rg_saved" type="number" inputmode="decimal" placeholder="Saved so far"></div><button class="btn" data-rgsave="' + n + '">Save goal</button></div>';
  } else {
    h += '<button class="btn ghost small mt" data-rgopen="' + n + '">+ Add a goal here</button>';
  }
  return h;
}
function renderRoadmap() {
  var st = S.settings || {}; var cur = Number(st.baby_step) || 1;
  var income = Number(st.income_monthly) || 0; var monExp = monthlyExpenses();
  var h = '<div class="wrap">' + topbar();
  h += '<div class="card"><h2>Your Roadmap to Freedom</h2><p class="muted">Seven steps, in order — the proven Dave Ramsey path. Focus on one at a time. You\'re on <b>Step ' + cur + '</b>.</p></div>';

  BABY_STEPS.forEach(function (s) {
    var done = stepComplete(s, cur); var isCur = s.n === cur;
    var badge = done ? '<span style="background:var(--good);color:#fff;width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700">✓</span>'
      : '<span style="background:' + (isCur ? 'var(--gold)' : 'var(--track)') + ';color:' + (isCur ? '#fff' : 'var(--sub)') + ';width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--serif)">' + s.n + '</span>';
    h += '<div class="card"' + (isCur ? ' style="border:1.5px solid var(--gold)"' : '') + '>';
    h += '<div style="display:flex;gap:12px;align-items:flex-start">' + badge + '<div style="flex:1"><div class="spread"><b style="font-size:15px">' + s.title + '</b>' + (isCur ? '<span class="pill">You\'re here</span>' : done ? '<span class="pill good">Done</span>' : '') + '</div><p class="muted" style="margin-top:2px">' + s.desc + '</p></div></div>';
    h += '<div style="margin-left:42px">';

    if (s.kind === 'debt') {
      if (S.debt_start > 0) {
        h += '<div class="bar mt"><i style="width:' + S.debt_paid_pct + '%"></i></div><div class="spread"><span class="muted">' + S.debt_paid_pct.toFixed(0) + '% paid</span><b>' + fmt(S.debt_total) + ' left</b></div>';
      } else h += '<p class="muted mt">Add your debts in the Debts tab to track this step.</p>';
      h += '<button class="btn ghost small mt" id="rm_debts">Go to Debts</button>';
    } else if (s.kind === 'retire') {
      if (income > 0) h += '<div class="pill mt">Target: about ' + fmt0(income * 0.15) + '/mo (15% of income)</div>';
      h += '<p class="muted mt">Track your retirement accounts here:</p>';
      h += '<div class="chips">' + STEP4_ACCOUNTS.map(function (a) { return '<span class="chip" data-r4="' + esc(a) + '">+ ' + a + '</span>'; }).join('') + '</div>';
      h += goalBlock(4);
      h += '<p class="muted mt" style="font-size:12px">General education from the Dave Ramsey framework — not personalized investment advice. Talk to a licensed advisor about what\'s right for you, especially your 401(k) match and IRA choices.</p>';
    } else if (s.kind === 'freedom') {

    h += '</div></div>';
  });
  h += '</div>'; q('view').innerHTML = h;

  if (q('rm_debts')) q('rm_debts').onclick = function () { TAB = 'debts'; renderShell(); render(); };
  Array.prototype.forEach.call(document.querySelectorAll('[data-setstep]'), function (el) { el.onclick = function () { api('settings', 'PUT', { baby_step: +el.getAttribute('data-setstep') }).then(function () { toast('Roadmap updated'); return load(); }).catch(oops); }; });
  Array.prototype.forEach.call(document.querySelectorAll('[data-rgopen]'), function (el) { el.onclick = function () { ROADMAP_OPEN = +el.getAttribute('data-rgopen'); renderRoadmap(); }; });
  Array.prototype.forEach.call(document.querySelectorAll('[data-rgsave]'), function (el) { el.onclick = function () { var n = +el.getAttribute('data-rgsave'); if (!val('rg_name')) { toast('Name your goal'); return; } api('goals', 'POST', { name: val('rg_name'), target_amount: parseFloat(val('rg_target')) || 0, saved_amount: parseFloat(val('rg_saved')) || 0, step: n }).then(function () { ROADMAP_OPEN = null; toast('Goal added'); return load(); }).catch(oops); }; });
  Array.prototype.forEach.call(document.querySelectorAll('[data-r4]'), function (el) { el.onclick = function () { api('goals', 'POST', { name: el.getAttribute('data-r4'), target_amount: 0, saved_amount: 0, step: 4 }).then(function () { toast('Added ' + el.getAttribute('data-r4')); return load(); }).catch(oops); }; });
  Array.prototype.forEach.call(document.querySelectorAll('[data-addg]'), function (el) { el.onclick = function () { var a = parseFloat(prompt('How much to add?') || ''); if (!(a > 0)) return; api('goals', 'PUT', { id: el.getAttribute('data-addg'), add: a }).then(function () { toast('Added ' + fmt(a)); return load(); }).catch(oops); }; });
  Array.prototype.forEach.call(document.querySelectorAll('[data-delg]'), function (el) { el.onclick = function () { if (!confirm('Delete this goal?')) return; api('goals?id=' + el.getAttribute('data-delg'), 'DELETE').then(load).catch(oops); }; });
}

  if (q('m_disconnect')) q('m_disconnect').onclick = function () { if (!confirm('Disconnect from your coach?')) return; api('connectcoach', 'PUT', { disconnect: true }).then(function () { toast('Disconnected'); return load(); }).catch(oops); };
  if (q('m_invitec')) q('m_invitec').onclick = function () { fallbackCopy('Will you be my money coach? I\'m using Pocket Planner to get my finances back on track. Create a free coach account here: ' + APP_URL + '?becoach=1 — then send me your coach code so I can connect.'); };
  if (q('m_savecontact')) q('m_savecontact').onclick = function () { api('profile', 'PUT', { email: val('m_email'), phone: q('m_phone') ? val('m_phone') : undefined }).then(function () { S.user.email = val('m_email'); toast('Saved'); }).catch(oops); };
  if (q('m_redo')) q('m_redo').onclick = function () { setStep(2, function () { document.body.classList.add('flow'); q('tabbar').classList.add('hidden'); load(); }); };
  if (q('m_copylink')) q('m_copylink').onclick = function () { fallbackCopy('Join me on Pocket Planner to get your finances back on track: ' + APP_URL + '?join=' + (S.user.invite_code || '')); };
  q('m_logout').onclick = function () { api('logout', 'POST').catch(function () {}).then(function () { setToken(''); S = null; COACH = null; TAB = 'home'; AUTHMODE = 'login'; AUTHROLE = null; renderAuth(); }); };
}

/* ---------------- INIT ---------------- */
if (PREFILL.reset) { setToken(''); renderAuth(); }
else if (TOKEN) { load(); }
else { if (PREFILL.role) { AUTHMODE = 'signup'; AUTHROLE = PREFILL.role; } renderAuth(); }
</script>
</body>
</html>
